<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Care for the Collection · Our Love Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/admin.css">
  </head>
  <body>
    <header class="topbar">
      <a class="wordmark" href="/" aria-label="Our Love Memories home">Our Love Memories</a>
      <a class="text-link" href="/">View memories</a>
    </header>

    <main>
      <section class="admin-intro" aria-labelledby="adminTitle">
        <h1 id="adminTitle">Care for the collection</h1>
        <p>Update the words that keep each memory close.</p>
      </section>
      <form class="admin-login" id="tokenForm">
        <label for="adminToken">Admin token</label>
        <div class="token-row">
          <input id="adminToken" name="adminToken" type="password" autocomplete="current-password" placeholder="Paste ADMIN_TOKEN">
          <button class="icon-button" type="submit">Unlock</button>
        </div>
      </form>

      <section class="status" id="adminStatus">Enter your admin token to care for the memories.</section>
      <section class="admin-list" id="adminList"></section>
    </main>

    <script src="/admin.js" type="module"></script>
  </body>
</html>
