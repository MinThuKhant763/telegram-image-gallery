<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Care for the Collection · Our Love Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/admin.css">
  </head>
  <body>
    <header class="topbar">
      <a class="wordmark" href="/" aria-label="Our Love Memories home">Our Love Memories</a>
      <nav class="topbar-actions" aria-label="Site navigation">
        <a class="text-link" href="/notes.html">Notes</a>
        <a class="text-link" href="/">View memories</a>
        <button class="toolbar-icon-button theme-toggle" data-theme-toggle type="button" title="Switch to dark mode" aria-label="Switch to dark mode">
          <svg class="theme-icon theme-icon--sun" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5" /><path d="M12 2.5v2M12 19.5v2M21.5 12h-2M4.5 12h-2M18.7 5.3l-1.4 1.4M6.7 17.3l-1.4 1.4M18.7 18.7l-1.4-1.4M6.7 6.7 5.3 5.3" /></svg>
          <svg class="theme-icon theme-icon--moon" aria-hidden="true" viewBox="0 0 24 24"><path d="M20 15.2A8.4 8.4 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z" /></svg>
        </button>
      </nav>
    </header>

    <main>
      <section class="admin-intro" aria-labelledby="adminTitle">
        <h1 id="adminTitle">Care for the collection</h1>
        <p>Update the words that keep each memory close.</p>
      </section>
      <form class="admin-login" id="tokenForm">
        <label for="adminToken">Admin token</label>
        <div class="token-row">
          <input id="adminToken" name="adminToken" type="password" autocomplete="current-password" placeholder="Paste ADMIN_TOKEN">
          <button class="icon-button" type="submit">Unlock</button>
        </div>
      </form>

      <section class="status" id="adminStatus">Enter your admin token to care for the memories.</section>
      <section class="admin-list" id="adminList"></section>
    </main>

    <script src="/admin.js" type="module"></script>
  </body>
</html>
