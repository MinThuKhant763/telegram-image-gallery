<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Our Love Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="memory-strip" aria-hidden="true"></div>
    <header class="topbar">
      <a class="wordmark" href="/" aria-label="Our Love Memories home">Our Love Memories</a>
      <nav class="topbar-actions" aria-label="Site navigation">
        <a class="text-link" href="/notes.html">Notes</a>
        <a class="toolbar-icon-button" href="/admin.html" title="Admin" aria-label="Admin">
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" /><path d="M4.5 21a7.5 7.5 0 0 1 15 0" /></svg>
        </a>
        <button class="toolbar-icon-button theme-toggle" data-theme-toggle type="button" title="Switch to dark mode" aria-label="Switch to dark mode">
          <svg class="theme-icon theme-icon--sun" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5" /><path d="M12 2.5v2M12 19.5v2M21.5 12h-2M4.5 12h-2M18.7 5.3l-1.4 1.4M6.7 17.3l-1.4 1.4M18.7 18.7l-1.4-1.4M6.7 6.7 5.3 5.3" /></svg>
          <svg class="theme-icon theme-icon--moon" aria-hidden="true" viewBox="0 0 24 24"><path d="M20 15.2A8.4 8.4 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z" /></svg>
        </button>
        <button class="toolbar-icon-button" id="refreshButton" type="button" title="Refresh memories" aria-label="Refresh memories">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.7-3.8L3 10" /><path d="M3 5v5h5M4 13a8 8 0 0 0 14.7 3.8L21 14" /><path d="M21 19v-5h-5" /></svg>
        </button>
      </nav>
    </header>

    <main>
      <section class="intro" aria-labelledby="pageTitle">
        <h1 id="pageTitle">Every little moment,<br>kept close.</h1>
        <span class="intro-rule" aria-hidden="true"></span>
        <p>Our shared collection of places, days, and the moments in between.</p>
      </section>
      <section class="status" id="status">Loading gallery...</section>
      <section class="gallery" id="gallery" aria-live="polite"></section>
    </main>

    <dialog class="lightbox" id="lightbox">
      <button class="close-button" id="closeLightbox" type="button" aria-label="Close preview">Close</button>
      <img id="lightboxImage" alt="">
      <div class="lightbox-meta">
        <h2 id="lightboxCaption"></h2>
        <p id="lightboxDetails"></p>
        <button class="delete-button" id="deleteImageButton" type="button" hidden>Delete image</button>
      </div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
